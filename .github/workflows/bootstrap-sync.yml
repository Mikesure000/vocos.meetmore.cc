name: Bootstrap Vocos Source

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download current source archive
        run: |
          curl -fsSL "https://vocos.meetmore.cc/vocos-source-20260530-002.zip" -o /tmp/vocos-source.zip
          rm -rf /tmp/vocos-source
          mkdir -p /tmp/vocos-source
          unzip -q /tmp/vocos-source.zip -d /tmp/vocos-source

      - name: Replace repository contents
        run: |
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/workflows/' \
            --exclude 'fullstack/.env' \
            --exclude 'fullstack/data/' \
            --exclude '*.db' \
            --exclude '*.sqlite' \
            --exclude '*.sqlite3' \
            --exclude '*.log' \
            /tmp/vocos-source/ ./

      - name: Commit source snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to sync."
          else
            git commit -m "Sync Vocos iteration source"
            git push
          fi
