# Voice of Consumer OS - Nginx 配置 (腾讯云生产环境)
# 部署位置: /etc/nginx/sites-available/vocosai.com
# 软链接: sudo ln -s /etc/nginx/sites-available/vocosai.com /etc/nginx/sites-enabled/

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    listen [::]:80;
    server_name vocosai.com www.vocosai.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vocosai.com www.vocosai.com;

    # SSL 证书（由 certbot 自动管理）
    ssl_certificate     /etc/letsencrypt/live/vocosai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vocosai.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 安全头部
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # 静态文件（通过 Nginx 直接服务，减轻 Python 压力）
    location /static/ {
        alias /opt/vocosai/public/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 根路径指向 index.html
    location = / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 路由全部转发到 Python 后端
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（AI 分析请求可能较慢）
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
    }

    # 其他页面路由
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如有需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 日志
    access_log /var/log/nginx/vocosai-access.log;
    error_log  /var/log/nginx/vocosai-error.log;
}
